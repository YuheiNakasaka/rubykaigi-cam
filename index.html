<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RubyKaigi 2026 Photo Frame</title>
  <meta name="description" content="RubyKaigi 2026 Photo Frame - Take a photo and create a memorable keepsake!">
  <meta property="og:title" content="RubyKaigi 2026 Photo Frame">
  <meta property="og:description" content="Create your RubyKaigi 2026 photo frame keepsake!">
  <link rel="preload" as="image" href="rubykaigi_2026_photo_frame.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Screen 1: Start -->
    <div id="start-screen" class="screen">
      <h1>RubyKaigi 2026<br>Photo Frame</h1>
      <p class="subtitle">Take a photo and create a keepsake!</p>

      <div id="camera-container" class="hidden">
        <video id="camera-preview" autoplay playsinline muted></video>
        <div id="camera-controls">
          <button id="btn-flip" class="btn-icon" aria-label="Flip camera">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M8 21H3v-5"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
          </button>
          <button id="btn-shutter" aria-label="Take photo">
            <div class="shutter-inner"></div>
          </button>
          <button id="btn-cancel-camera" class="btn-icon" aria-label="Cancel">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div id="input-buttons">
        <button id="btn-camera" class="btn-primary">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Take a Photo
        </button>
        <button id="btn-gallery" class="btn-secondary">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Choose from Gallery
        </button>
      </div>

      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <!-- Screen 2: Adjust -->
    <div id="adjust-screen" class="screen hidden">
      <p class="instruction">Drag to move, pinch to resize</p>
      <div id="canvas-wrapper">
        <canvas id="preview-canvas"></canvas>
      </div>
      <div class="button-row">
        <button id="btn-retake" class="btn-secondary">Retake</button>
        <button id="btn-done" class="btn-primary">Done</button>
      </div>
    </div>

    <!-- Screen 3: Result -->
    <div id="result-screen" class="screen hidden">
      <div id="result-wrapper">
        <canvas id="result-canvas"></canvas>
      </div>
      <div class="button-stack">
        <button id="btn-download" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
        <div class="button-row">
          <button id="btn-share" class="btn-secondary hidden">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
          <button id="btn-another" class="btn-secondary">Take Another</button>
        </div>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
